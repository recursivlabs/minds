name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Typecheck + unit tests gate every PR. The build used to be the only check,
  # so type errors and logic regressions shipped to deploy unnoticed.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec expo export --platform web
        env:
          EXPO_PUBLIC_RECURSIV_API_URL: https://api.recursiv.io/api/v1
          EXPO_PUBLIC_RECURSIV_ORG_ID: 019d517b-bb87-744d-92db-b3801dc15927
